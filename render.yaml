# Render Blueprint — deploy with "New + > Blueprint" in the Render
# dashboard, pointed at this repo. Render reads this file automatically.
#
# This deploys ONLY the FastAPI service (api.py), not the Tkinter
# desktop app — the desktop app has no place to run on a headless server.
services:
  - type: web
    name: shiftiq-api
    env: python
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
